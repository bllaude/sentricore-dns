version: '3.8'

services:
  sentricore-dns:
    build: .
    container_name: sentricore-dns
    ports:
      - "5300:5300/udp"
      - "5000:5000/tcp"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./blocklists:/app/blocklists
      - ./config.json:/app/config.json:ro
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    networks:
      - sentricore-network

networks:
  sentricore-network:
    driver: bridge
